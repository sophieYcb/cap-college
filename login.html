<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Connexion — Cap Collège</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
<main class="page auth-page">
  <header class="topbar">
    <a class="brand" href="index.html"><div class="logo">C</div><span>Cap Collège</span></a>
    <div class="badge">Connexion</div>
  </header>
  <section class="card auth-card">
    <h1>Se connecter</h1>
    <p>Retrouve tes diagnostics et ta progression sur tous tes appareils.</p>
    <form id="loginForm">
      <label>Adresse e-mail
        <input id="email" type="email" autocomplete="email" required>
      </label>
      <label>Mot de passe
        <input id="password" type="password" autocomplete="current-password" required>
      </label>
      <button class="btn btn-primary" type="submit">Se connecter</button>
    </form>
    <p id="loginMessage" class="notice hidden" aria-live="polite"></p>
  </section>
</main>
<script src="supabase-config.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase-app.js"></script>
<script>
  const form = document.getElementById("loginForm");
  const message = document.getElementById("loginMessage");
  form.addEventListener("submit", async (event) => {
    event.preventDefault();
    message.classList.add("hidden");
    try {
      await CapCollegeSupabase.signIn(
        document.getElementById("email").value,
        document.getElementById("password").value
      );
      const requested = new URLSearchParams(location.search).get("next");
      const safeNext = /^[a-z0-9-]+\.html$/i.test(requested || "")
        ? requested
        : "index.html";
      location.replace(safeNext);
    } catch (error) {
      message.textContent = "Connexion impossible. Vérifie tes identifiants.";
      message.classList.remove("hidden");
    }
  });
</script>
</body>
</html>
