<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Bilan de la séance — Cap Collège</title><link rel="stylesheet" href="styles.css">
</head>
<body>
<main class="page">
<header class="topbar">
  <a class='brand' href='index.html'><div class="logo">C</div><span>Cap Collège</span></a>
  <div class="badge">Bilan de la séance</div>
</header>

<section class="card">
  <h1>Bilan de la séance</h1>
  <p id="globalText"></p>
  <div class="summary-grid" id="summary"></div>
  <div class="actions">
    <a class='btn btn-primary' href='remediation.html'>Commencer la remise à niveau</a>
    <a class='btn btn-secondary' href='evaluation.html'>Refaire l’évaluation</a>
    <a class='btn btn-secondary' href='index.html'>Accueil</a>
  </div>
</section>

<section class="card" id="recommendationSection">
  <h2>Compétence conseillée</h2>
  <div id="recommendation"></div>
</section>

<section class="card" id="mistakesSection">
  <div class="result-head">
    <h2>Revoir mes erreurs</h2>
    <span class="badge" id="mistakesCount"></span>
  </div>
  <div id="mistakesList"></div>
</section>

<section class="card"><h2>Priorités</h2><div id="priorities"></div></section>
<section class="card"><h2>Thèmes rencontrés pendant cette séance</h2><div id="skillsResults"></div></section>
</main>
<script src="supabase-config.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase-app.js"></script>
<script src="resultats-loader.js"></script>
</body>
</html>
